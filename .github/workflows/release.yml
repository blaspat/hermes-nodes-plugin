name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Gate: run tests before releasing
  # ---------------------------------------------------------------------------
  test:
    name: test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff
      - name: Lint
        run: ruff check .
      - name: Check compile
        run: |
          python -m py_compile $(git ls-files '*.py')

  # ---------------------------------------------------------------------------
  # Release
  # ---------------------------------------------------------------------------
  release:
    name: publish GitHub Release
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build source archive
        run: |
          TAG="${{ github.ref_name }}"
          ARCHIVE="hermes-nodes-plugin-${TAG#v}.tar.gz"
          mkdir -p dist
          git archive --format=tar.gz --prefix="hermes-nodes-plugin-${TAG#v}/" \
            -o "dist/${ARCHIVE}" HEAD
          echo "artifact=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" &>/dev/null; then
            # Release already exists (created by GitHub web UI when tag was made).
            # Upload the asset and update notes.
            gh release upload "$TAG" "dist/${artifact}" --clobber
            echo "Uploaded ${artifact} to existing release ${TAG}"
          else
            gh release create "$TAG" \
              "dist/${artifact}" \
              --title "$TAG" \
              --generate-notes
            echo "Created release ${TAG}"
          fi
